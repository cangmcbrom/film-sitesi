<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzleme Listem — Film, Dizi & Anime</title>
    <meta name="description" content="Film, dizi ve anime izleme listenizi kolayca yönetin. Modern ve şık arayüz ile içeriklerinizi takip edin.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-inner">
            <div class="header-left">
                <span class="logo-icon">🎬</span>
                <h1 class="logo-text">İzleme Listem</h1>
            </div>
            <div class="header-right">
                <div class="search-wrapper" id="searchWrapper">
                    <button class="search-toggle" id="searchToggle" aria-label="Ara">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                    <input type="text" class="search-input" id="searchInput" placeholder="İçerik ara..." autocomplete="off">
                </div>
                <button class="btn-add" id="btnAdd">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>Ekle</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main">
        <!-- Category Tabs -->
        <nav class="tabs" id="tabs">
            <button class="tab active" data-category="all">
    <span class="tab-icon">📋</span> Tümü <span class="tab-count" id="count-all">0</span>
</button>
<button class="tab" data-category="film">
    <span class="tab-icon">🎥</span> Film <span class="tab-count" id="count-film">0</span>
</button>
<button class="tab" data-category="dizi">
    <span class="tab-icon">📺</span> Dizi <span class="tab-count" id="count-dizi">0</span>
</button>
<button class="tab" data-category="anime">
    <span class="tab-icon">⛩️</span> Anime <span class="tab-count" id="count-anime">0</span>
</button>
        </nav>

        <!-- Status Filters -->
        <div class="status-filters" id="statusFilters">
            <button class="status-btn active" data-status="all">Hepsi <span class="status-count" id="scount-all">0</span></button>
<button class="status-btn" data-status="izlenecek">İzlenecek <span class="status-count" id="scount-izlenecek">0</span></button>
<button class="status-btn" data-status="izleniyor">İzleniyor <span class="status-count" id="scount-izleniyor">0</span></button>
<button class="status-btn" data-status="bitti">Bitti <span class="status-count" id="scount-bitti">0</span></button>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">🍿</div>
            <h2>Henüz içerik eklenmedi</h2>
            <p>Sağ üstteki <strong>"+ Ekle"</strong> butonuna tıklayarak ilk içeriğini ekle!</p>
        </div>
    </main>

    <!-- ===== MODAL (Add / Edit) ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Yeni İçerik Ekle</h2>
                <button class="modal-close" id="modalClose" aria-label="Kapat">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form class="modal-form" id="modalForm">
                <input type="hidden" id="editId" value="">
                <div class="form-group">
                    <label for="inputTitle">Başlık <span class="required">*</span></label>
                    <input type="text" id="inputTitle" placeholder="Örn: Breaking Bad" required>
                </div>
                <div class="form-group">
                    <label for="inputDesc">Açıklama</label>
                    <textarea id="inputDesc" rows="3" placeholder="Kısa bir açıklama yazabilirsiniz..."></textarea>
                </div>
                <div class="form-group">
                    <label for="inputImage">Görsel URL <span class="required">*</span></label>
                    <input type="url" id="inputImage" placeholder="https://ornek.com/kapak.jpg" required>
                    <div class="image-preview" id="imagePreview"></div>
                </div>
                <div class="form-group">
                    <label for="inputUrl">Yönlendirme Linki</label>
                    <input type="url" id="inputUrl" placeholder="https://ornek.com/izle">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="inputCategory">Kategori <span class="required">*</span></label>
                        <select id="inputCategory" required>
                            <option value="film">🎥 Film</option>
                            <option value="dizi">📺 Dizi</option>
                            <option value="anime">⛩️ Anime</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputStatus">Durum <span class="required">*</span></label>
                        <select id="inputStatus" required>
                            <option value="izlenecek">İzlenecek</option>
                            <option value="izleniyor">İzleniyor</option>
                            <option value="bitti">Bitti</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-save" id="btnSave">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span id="btnSaveText">Kaydet</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ===== DELETE CONFIRM MODAL ===== -->
    <div class="modal-overlay" id="deleteOverlay">
        <div class="modal modal-sm">
            <div class="delete-content">
                <div class="delete-icon">🗑️</div>
                <h2>Silmek istediğine emin misin?</h2>
                <p>Bu işlem geri alınamaz.</p>
                <div class="delete-actions">
                    <button class="btn-cancel" id="deleteCancel">İptal</button>
                    <button class="btn-delete" id="deleteConfirm">Sil</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Firebase SDK (CDN - compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
